<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Listado de Actas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm mb-4">
  <div class="container">
    <a class="navbar-brand fw-bold" th:href="@{/actas}">Sistema de Actas</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto align-items-center">
        <li class="nav-item">
          <a class="nav-link" th:href="@{/actas}">
            📋 Ver Historial de Actas
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:href="@{/autoridades}">👮 Autoridades</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" th:href="@{/infracciones}">⛔ Infracciones</a>
        </li>
        <li class="nav-item ms-lg-2">
          <a class="btn btn-primary btn-sm text-white active" th:href="@{/actas/crear}">
            ➕ Nueva Acta
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container pb-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Actas Registradas</h2>
  </div>

  <div class="table-responsive bg-white shadow-sm rounded p-3">
    <table class="table table-hover align-middle">
      <thead class="table-dark">
      <tr>
        <th>Nº Acta</th>
        <th>Fecha y Hora</th>
        <th>Lugar</th>
        <th>Dominio</th>
        <th>Infractor DNI</th>
        <th>Autoridad</th>
        <th>Acciones</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="acta : ${actas}">
        <td th:text="${acta.id}"></td>
        <td th:text="${acta.fechaDeLabrado + ' ' + acta.horaDeLabrado}"></td>
        <td th:text="${acta.lugarDeConstatacion}"></td>
        <td th:text="${acta.vehiculo?.dominio}"></td>
        <td th:text="${acta.licencia?.conductor?.dni}"></td>
        <td th:text="${acta.autoridadConstatacion?.apellido}"></td>
        <td>
          <a th:href="@{/actas/detalle/{id}(id=${acta.id})}" class="btn btn-sm btn-info text-white">Ver Detalle</a>
        </td>
      </tr>
      <tr th:if="${#lists.isEmpty(actas)}">
        <td colspan="7" class="text-center text-muted py-3">No hay actas cargadas.</td>
      </tr>
      </tbody>
    </table>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
