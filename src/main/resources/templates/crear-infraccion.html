<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Crear Infracción</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/actas}">Sistema de Actas</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/actas}">
                        📋 Ver Historial de Actas
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/autoridades}">👮 Autoridades</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/infracciones}">⛔ Infracciones</a>
                </li>
                <li class="nav-item ms-lg-2">
                    <a class="btn btn-primary btn-sm text-white active" th:href="@{/actas/crear}">
                        ➕ Nueva Acta
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container pb-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <h2 class="mb-4">Registrar Nueva Infracción</h2>

            <form th:action="@{/infracciones/guardar}" method="POST" class="bg-white p-4 shadow-sm rounded needs-validation" novalidate>

                <h5 class="text-danger border-bottom pb-2 mb-3">Datos de la Infracción</h5>
                <div class="row g-3 mb-4">
                    <div class="col-md-12">
                        <label class="form-label fw-bold">Descripción / Motivo *</label>
                        <input type="text" class="form-control" name="descipInfraccion" placeholder="Ej: Cruzar semáforo en rojo" required>
                        <div class="invalid-feedback">Ingrese la descripción de la infracción.</div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Importe a Pagar ($) *</label>
                        <input type="number" step="0.01" min="0" class="form-control" name="importedeInfraccion" placeholder="Ej: 15000.50" required>
                        <div class="invalid-feedback">Ingrese un importe numérico válido.</div>
                    </div>
                </div>

                <div class="d-flex justify-content-end mt-4">
                    <a th:href="@{/infracciones}" class="btn btn-outline-secondary me-2">Cancelar</a>
                    <button type="submit" class="btn btn-success">Guardar Infracción</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    (() => {
        'use strict'
        const forms = document.querySelectorAll('.needs-validation')
        Array.from(forms).forEach(form => {
            form.addEventListener('submit', event => {
                if (!form.checkValidity()) {
                    event.preventDefault()
                    event.stopPropagation()
                }
                form.classList.add('was-validated')
            }, false)
        })
    })()
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
